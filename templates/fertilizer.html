<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fertilizer Recommendation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }
        .form-container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-container h1 {
            color: #4CAF50;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .submit-btn:hover {
            background-color: #45a049;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #2196F3;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>🌱 Fertilizer Recommendation</h1>
        <p style="text-align: center; color: #666; margin-bottom: 25px;">Enter soil and environmental parameters to get fertilizer recommendation:</p>
        <form action="/fertilizer-predict" method="post">
            <div class="form-group">
                <label for="N">Nitrogen (N):</label>
                <input type="number" step="0.01" id="N" name="N" placeholder="e.g., 90" required>
            </div>
            <div class="form-group">
                <label for="P">Phosphorus (P):</label>
                <input type="number" step="0.01" id="P" name="P" placeholder="e.g., 42" required>
            </div>
            <div class="form-group">
                <label for="K">Potassium (K):</label>
                <input type="number" step="0.01" id="K" name="K" placeholder="e.g., 43" required>
            </div>
            <div class="form-group">
                <label for="temperature">Temperature (°C):</label>
                <input type="number" step="0.01" id="temperature" name="temperature" placeholder="e.g., 25.5" required>
            </div>
            <div class="form-group">
                <label for="humidity">Humidity (%):</label>
                <input type="number" step="0.01" id="humidity" name="humidity" placeholder="e.g., 80" required>
            </div>
            <div class="form-group">
                <label for="moisture">Soil Moisture (%):</label>
                <input type="number" step="0.01" id="moisture" name="moisture" placeholder="e.g., 50" required>
            </div>
            <div class="form-group">
                <label for="soil_type">Soil Type (0-8):</label>
                <input type="number" id="soil_type" name="soil_type" placeholder="e.g., 2" required>
            </div>
            <div class="form-group">
                <label for="Urea">Urea (kg/ha):</label>
                <input type="number" step="0.01" id="Urea" name="Urea" placeholder="e.g., 100" required>
            </div>
             
            <button type="submit" class="submit-btn">🔍 Get Recommendation</button>
        </form>
        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>
</body>
</html>
